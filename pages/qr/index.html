<script>
    //// 詳細表示・非表示の一括処理
    // すべての「tgl-btn」クラスを持つ要素に対してループ処理を行う
    document.querySelectorAll('.tgl-btn').forEach((btn, index) => {
        btn.addEventListener('click', () => {
            // 対応する id="hide-area-X" を取得 (tgl-btn-1 なら hide-area-1)
            const targetId = `hide-area-${index + 1}`;
            const targetArea = document.getElementById(targetId);

            if(targetArea.style.display === 'none'){
                targetArea.style.display = 'block';
                btn.textContent = '詳細 v';
            } else {
                targetArea.style.display = 'none';
                btn.textContent = '詳細 >';
            }
        });
    });


    // ------------------------------
    // countAPI(自作)
    // ------------------------------


    // API利用合言葉
    const api_pass = "fire-thunder";

    // 加算用関数
    async function countAPIadd(pw, id){
        // const url = "https://floor02.sakura.ne.jp/function/ct/ct.php?pw=" + pw + "&id=" + id; // ■■ デバッグ時はここをコメントアウト
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("HTTPerr: " + response.status);
            const data = await response.json();

            if (data.status === "success") {
                return data.count;
            } else {
                return "DBerr";
            }
        } catch (error) {
            console.error("RQerr:", error);
            return "RQerr";
        }
    }

    // 取得用関数
    async function countAPIget(pw, id){
        // md=get をパラメータに含める
        const url = "https://floor02.sakura.ne.jp/function/ct/ct.php?pw=" + pw + "&id=" + id + "&md=get";

        try {
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error("HTTPerr: " + response.status);
            }

            const data = await response.json();

            if (data.status === "success") {
                return data.count;
            } else {
                console.error("DBerr:", data.message);
                return "DBerr";
            }
        } catch (error) {
            console.error("RQerr:", error);
            return "RQerr";
        }
    }


        // 画面が読み込まれた時に、両方の処理をまとめて実行する
    window.addEventListener('DOMContentLoaded', async () => {

        // ------------------------------
        // 処理1：アクセスカウンター（自動加算）
        // ------------------------------
        const viewCountId = "kah221_shared_qr_view";
        const hasVisited = sessionStorage.getItem("visited_" + viewCountId);
        let viewResultCount;

        if (hasVisited) {
            console.log("visited >>> countAPIget");
            viewResultCount = await countAPIget(api_pass, viewCountId);
        } else {
            console.log("firsttime >>> countAPIadd");
            viewResultCount = await countAPIadd(api_pass, viewCountId);
            if (viewResultCount !== "DBerr" && viewResultCount !== "RQerr") {
                sessionStorage.setItem("visited_" + viewCountId, "true");
            }
        }

        // 取得した数字をHTMLに反映（要素が存在する場合のみ）
        const displayElement = document.getElementById("countAPI-display");
        if (displayElement) {
            displayElement.innerText = viewResultCount;
        }

        // ------------------------------
        // 処理2：見たよボタン（クリックで加算）
        // ------------------------------
        const counters = document.querySelectorAll('.simple-counter');

        for (const counter of counters) {
            const targetId = counter.dataset.id;
            const hasClicked = sessionStorage.getItem("clicked_" + targetId);

            // 1. 初期表示（APIから現在の数字を取得して表示）
            counter.innerText = "...";
            const initialCount = await countAPIget(api_pass, targetId);
            counter.innerText = (initialCount !== "DBerr" && initialCount !== "RQerr") ? initialCount : "err";

            if (hasClicked) {
                counter.style.opacity = "0.5";
                counter.style.cursor = "not-allowed";
                continue;
            }

            // 2. クリックイベントの登録（クリックで加算）
            counter.addEventListener('click', async () => {
                // 連打防止（通信中なら何もしない）
                if (counter.dataset.processing === "true" || sessionStorage.getItem("clicked_" + targetId)) return;

                // 処理中フラグを立てて、表示を「...」にする
                counter.dataset.processing = "true";
                const originalCount = counter.innerText;
                counter.innerText = "...";

                // APIを叩いて加算
                const newCount = await countAPIadd(api_pass, targetId);

                // 結果の反映
                if (newCount !== "DBerr" && newCount !== "RQerr") {
                    counter.innerText = newCount;
                    sessionStorage.setItem("clicked_" + targetId, "true");
                    counter.style.opacity = "0.5";
                    counter.style.cursor = "not-allowed";
                } else {
                    counter.innerText = originalCount; // 失敗時は元の数字に戻す
                }

                // 処理中フラグを解除
                counter.dataset.processing = "false";
            });
        }

    });

    </script>
